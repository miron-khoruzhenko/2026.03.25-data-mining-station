version: '3.8'

services:
  data-miner:
    build: .
    container_name: ai_miner_bot
    ports:
      - "8501:8501"
    volumes:
      # КРИТИЧЕСКИ ВАЖНО: прокидываем папку data наружу! 
      # Иначе при перезапуске контейнера удалится вся база данных и Excel-файлы.
      - ./data:/app/data
      - ./.env:/app/.env
    # Скрытый механизм стабильности: Docker сам поднимет бота при любых сбоях или ребуте сервера
    restart: unless-stopped